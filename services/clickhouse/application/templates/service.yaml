apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: clickhouse  # routes traffic to pods with this label (matches deployment.yaml)
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: {{ .Values.service.httpPort }}
    - name: native
      port: {{ .Values.service.nativePort }}
      targetPort: {{ .Values.service.nativePort }}
