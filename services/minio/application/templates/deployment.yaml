apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio  # Service uses this label to route traffic to this pod
    spec:
      containers:
        - name: minio
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          args:
            - server
            - /data                   # directory inside the container where objects are stored
            - --console-address
            - ":{{ .Values.service.consolePort }}"  # pin console port so it's predictable
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.secretName }}    # Secret created in wave 0 by SealedSecrets
                  key: {{ .Values.auth.userKey }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.secretName }}
                  key: {{ .Values.auth.passwordKey }}
          ports:
            - containerPort: {{ .Values.service.apiPort }}     # S3 API
            - containerPort: {{ .Values.service.consolePort }} # web console
          resources:
            {{- toYaml .Values.resources | nindent 12 }}  # toYaml + nindent renders the resources block with correct indentation
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-pvc  # binds to the PVC in pvc.yaml
