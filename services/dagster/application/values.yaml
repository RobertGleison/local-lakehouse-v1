image:
  repository: dagster/dagster-celery-k8s
  tag: "1.10.0"

replicaCount: 1

dagsterHome: /dagster

service:
  webserverPort: 3000  # Dagster UI and GraphQL API

persistence:
  storageClassName: local-path  # k3s built-in provisioner
  size: 2Gi

resources:
  webserver:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  daemon:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m
