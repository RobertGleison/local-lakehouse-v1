image:
  repository: ghcr.io/projectnessie/nessie
  tag: latest

replicaCount: 1

versionStore:
  type: ROCKSDB       # storage backend for the catalog (RocksDB = embedded key-value store)
  rocksdb:
    dbPath: /nessie/db

persistence:
  storageClassName: local-path  # k3s built-in provisioner
  size: 2Gi

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

service:
  port: 19120  # Nessie REST API
