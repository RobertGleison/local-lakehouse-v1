name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Lint YAML
        run: uv run yamllint .

      - name: Run kube-score analysis
        continue-on-error: true
        run: |
          for app in infra/*/application; do
            echo "========================================="
            echo "🔍 Scoring Helm chart: $app"
            echo "========================================="
            helm template "$app" | docker run -i --rm zegl/kube-score:latest score - || true
          done

      - name: Run tests
        run: uv run pytest core/tests/ -v
