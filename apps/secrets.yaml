# apps/secrets.yaml
# Wave 0: deploy SealedSecrets manifests so Kubernetes Secrets exist before any pod starts
# Activate with: kubectl apply -f apps/secrets.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: phase-1-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0" # must run first — other apps depend on these secrets
spec:
  project: default
  source:
    repoURL: https://github.com/RobertGleison/local-datalake
    path: secrets                  # folder containing the SealedSecret manifests
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: phase-1
  syncPolicy:
    automated:
      prune: true      # delete secrets removed from git
      selfHeal: true   # re-apply if manually changed in the cluster
    syncOptions:
      - CreateNamespace=true
