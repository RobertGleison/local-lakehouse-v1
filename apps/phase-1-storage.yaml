# apps/phase-1-storage.yaml
# Activate with: kubectl apply -f apps/phase-1-storage.yaml
---
# Wave 0: Apply SealedSecrets so K8s Secrets exist before pods start
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: phase-1-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/RobertGleison/local-datalake
    path: secrets/phase-1
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: phase-1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# Wave 1: MinIO — needs minio-credentials Secret from wave 0
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      chart: minio
      targetRevision: "14.*"
      helm:
        valueFiles:
          - $values/helm/minio/values.yaml
    - repoURL: https://github.com/RobertGleison/local-datalake
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: phase-1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# Wave 1: Nessie — needs nessie-storage Secret from wave 0
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nessie
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: https://charts.projectnessie.org
      chart: nessie
      targetRevision: "0.*"
      helm:
        valueFiles:
          - $values/helm/nessie/values.yaml
    - repoURL: https://github.com/RobertGleison/local-datalake
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: phase-1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
