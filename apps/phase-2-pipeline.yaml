# apps/phase-2-pipeline.yaml
# Wave 2: deploy Dagster (depends on MinIO and Nessie from wave 1)
# Activate with: kubectl apply -f apps/phase-2-pipeline.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dagster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"  # runs after wave 1 (MinIO, Nessie)
spec:
  project: default
  source:
    repoURL: https://github.com/RobertGleison/local-datalake
    path: services/dagster/application
    targetRevision: feat/phase-2-dagster-deployment
  destination:
    server: https://kubernetes.default.svc
    namespace: local-datalake
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
