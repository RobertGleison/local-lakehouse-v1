# apps/loki.yaml
# Wave 5: deploy Loki log aggregation (depends on MinIO from wave 1 for S3 backend)
# Stores logs in MinIO loki-logs bucket — no PVC required.
# Activate with: kubectl apply -f apps/loki.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/RobertGleison/local-datalake
    path: services/loki/application
    targetRevision: feat/phase-2-dagster-deployment
  destination:
    server: https://kubernetes.default.svc
    namespace: local-datalake
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
