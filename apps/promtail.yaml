# apps/promtail.yaml
# Wave 6: deploy Promtail DaemonSet (depends on Loki at wave 5 for log ingestion endpoint)
# Activate with: kubectl apply -f apps/promtail.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  source:
    repoURL: https://github.com/RobertGleison/local-datalake
    path: services/promtail/application
    targetRevision: feat/phase-2-dagster-deployment
  destination:
    server: https://kubernetes.default.svc
    namespace: local-datalake
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
